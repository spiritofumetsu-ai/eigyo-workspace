<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>営業WS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1a56db;--blue2:#e8f0fe;
  --green:#0e9f6e;--green2:#def7ec;
  --orange:#d97706;--orange2:#fef3c7;
  --purple:#7c3aed;--purple2:#ede9fe;
  --red:#e02424;--red2:#fde8e8;
  --gray:#6b7280;--gray2:#f3f4f6;
  --border:#e5e7eb;--text:#111827;
  --bg:#f0f4ff;
  --navh:68px
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── Pages ── */
.page{display:none;position:fixed;top:0;left:0;right:0;bottom:calc(var(--navh) + env(safe-area-inset-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(env(safe-area-inset-top)+12px) 14px 20px}
.page.on{display:block}

/* ── Nav ── */
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--gray);cursor:pointer;font-size:10px;font-weight:600;height:var(--navh);padding:0}
.nb .ic{font-size:22px}
.nb.on{color:var(--blue)}

/* ── Card ── */
.card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:12px;overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-hd h2{font-size:15px;font-weight:700}
.cbody{padding:14px 16px}

/* ── Progress ── */
.pr{margin-bottom:14px}
.pr-lbl{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:5px}
.pr-lbl span:last-child{color:var(--gray);font-weight:400}
.pr-bar{height:11px;background:var(--gray2);border-radius:6px;overflow:hidden}
.pr-fill{height:100%;border-radius:6px;transition:width .4s}
.pr-sub{font-size:12px;color:var(--gray);margin-top:4px}

/* ── Chips ── */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;background:var(--blue2);color:var(--blue)}
.chip.red{background:var(--red2);color:var(--red)}

/* ── Pipeline box ── */
.pl-box{background:var(--blue2);border-radius:10px;padding:10px 12px;margin-top:12px;display:flex;gap:4px}
.pl-item{flex:1;text-align:center}
.pl-num{font-size:18px;font-weight:800;color:var(--blue)}
.pl-unit{font-size:11px}
.pl-lbl{font-size:10px;color:var(--gray);margin-top:1px}

/* ── Badges ── */
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bm {background:var(--blue2);  color:var(--blue)}
.bs {background:var(--orange2);color:var(--orange)}
.ba {background:var(--purple2);color:var(--purple)}
.bse{background:var(--green2); color:var(--green)}
.bo {background:var(--gray2);  color:var(--gray)}

/* ── Filter ── */
.frow{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none}
.frow::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer}
.fb.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── Prospect item ── */
.pi{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.pi:last-child{border-bottom:none}
.pi:active{background:var(--gray2)}
.pi-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pi-name{font-size:15px;font-weight:700}
.pi-sub{font-size:12px;color:var(--gray);margin-top:4px;line-height:1.5}

/* ── Task item ── */
.ti{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.ti:last-child{border-bottom:none}
.tck{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:1px;transition:.2s}
.tck.done{background:var(--green);border-color:var(--green);color:#fff}
.ttxt{flex:1;font-size:14px;line-height:1.4;cursor:pointer}
.ttxt.done{text-decoration:line-through;color:var(--gray)}

/* ── Resource ── */
.rc-hd{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.rc-hd:active{background:var(--gray2)}
.rc-name{font-size:15px;font-weight:700}
.ri-wrap{display:none;background:#fafbff}
.ri-wrap.open{display:block}
.ri{padding:11px 16px 11px 26px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.ri:last-child{border-bottom:none}
.ri:active{background:var(--gray2)}
.ri-add{padding:10px 16px 10px 26px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer}
.ri-add:active{opacity:.7}

/* ── Sheet/Modal ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;padding:0 18px calc(env(safe-area-inset-bottom)+28px)}
.sh-hnd{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 18px}
.sh-ttl{font-size:18px;font-weight:800;margin-bottom:18px}

/* ── Form ── */
.fg{margin-bottom:13px}
label{font-size:12px;font-weight:700;color:var(--gray);display:block;margin-bottom:5px;letter-spacing:.3px}
input,textarea,select{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:11px 12px;font-size:15px;font-family:inherit;color:var(--text);background:#fff;outline:none;-webkit-appearance:none;appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:120px;line-height:1.7}
.row2{display:flex;gap:10px}
.row2>.fg{flex:1;min-width:0}

/* ── Buttons ── */
.btn{border:none;border-radius:9px;padding:13px 16px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-bottom:8px;transition:.15s}
.btn:active{opacity:.75}
.btn-p{background:var(--blue);color:#fff}
.btn-d{background:var(--red);color:#fff}
.btn-g{background:var(--gray2);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;margin-bottom:0}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--navh) + env(safe-area-inset-bottom) + 14px);right:18px;width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:26px;display:none;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,86,219,.4);cursor:pointer;z-index:50}
.fab:active{opacity:.8;transform:scale(.95)}

/* ── Misc ── */
.empty{text-align:center;padding:40px 16px;color:var(--gray)}
.empty-ic{font-size:42px;margin-bottom:8px}
.info-box{background:var(--blue2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--blue);line-height:1.6;margin-bottom:12px}
.content-pre{background:var(--gray2);border-radius:8px;padding:12px;font-size:14px;line-height:1.8;white-space:pre-wrap;margin-top:6px}
.sec-lbl{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:.5px;padding:10px 0 4px;text-transform:uppercase}
.divider{height:1px;background:var(--border);margin:4px 0}
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav>
  <button class="nb on" id="nb-goal"     onclick="goto('goal')">    <span class="ic">🎯</span>ゴール</button>
  <button class="nb"    id="nb-prospect" onclick="goto('prospect')"><span class="ic">👥</span>見込み客</button>
  <button class="nb"    id="nb-task"     onclick="goto('task')">    <span class="ic">✅</span>タスク</button>
  <button class="nb"    id="nb-resource" onclick="goto('resource')"><span class="ic">📚</span>資料</button>
</nav>

<!-- ===== FABs ===== -->
<button class="fab" id="fab-p" onclick="openPNew()">＋</button>
<button class="fab" id="fab-t" onclick="openTNew()">＋</button>
<button class="fab" id="fab-r" onclick="openRCatNew()">＋</button>

<!-- ===== PAGE: GOAL ===== -->
<div class="page on" id="page-goal">

  <div class="card">
    <div class="card-hd">
      <h2>🏆 社長杯</h2>
      <button class="btn btn-g btn-sm" onclick="openShEdit()">目標編集</button>
    </div>
    <div class="cbody" id="sh-body">読み込み中…</div>
  </div>

  <div class="card">
    <div class="card-hd">
      <h2>📘 教弘年責</h2>
      <button class="btn btn-g btn-sm" onclick="openKyEdit()">実績更新</button>
    </div>
    <div class="cbody" id="ky-body">読み込み中…</div>
  </div>

</div>

<!-- ===== PAGE: PROSPECT ===== -->
<div class="page" id="page-prospect">
  <div class="frow" id="p-frow">
    <button class="fb on" data-f="all"        onclick="setFilter(this)">すべて</button>
    <button class="fb"    data-f="mikomu"     onclick="setFilter(this)">見込み</button>
    <button class="fb"    data-f="shodan"     onclick="setFilter(this)">商談中</button>
    <button class="fb"    data-f="oazukari"   onclick="setFilter(this)">お預かり</button>
    <button class="fb"    data-f="seiyaku"    onclick="setFilter(this)">成約</button>
    <button class="fb"    data-f="okotowari"  onclick="setFilter(this)">お断り</button>
  </div>
  <div class="card"><div id="p-list"></div></div>
</div>

<!-- ===== PAGE: TASK ===== -->
<div class="page" id="page-task">
  <div class="card"><div id="t-list"></div></div>
</div>

<!-- ===== PAGE: RESOURCE ===== -->
<div class="page" id="page-resource">
  <div class="card"><div id="res-list"></div></div>
</div>

<!-- ===== MODAL: 社長杯目標 ===== -->
<div class="ov" id="ov-sh" onclick="closeOv(event,'ov-sh')">
  <div class="sheet">
    <div class="sh-hnd"></div>
    <div class="sh-ttl">社長杯 目標設定</div>
    <div class="row2">
      <div class="fg"><label>AC目標（万円）</label><input type="number" id="sh-ac" inputmode="decimal"></div>
      <div class="fg"><label>被保数目標（名）</label><input type="number" id="sh-hi" inputmode="decimal" step="0.5"></div>
    </div>
    <div class="fg"><label>うち平準払目標（名）</label><input type="number" id="sh-ju" inputmode="decimal" step="0.5"></div>
    <button class="btn btn-p" onclick="saveShTarget()">保存</button>
    <button class="btn btn-g" onclick="closeO('ov-sh')">キャンセル</button>
  </div>
</div>

<!-- ===== MODAL: 教弘実績 ===== -->
<div class="ov" id="ov-ky" onclick="closeOv(event,'ov-ky')">
  <div class="sheet">
    <div class="sh-hnd"></div>
    <div class="sh-ttl">教弘年責 実績更新</div>
    <div class="info-box">対象期間：4月1日 〜 12月31日</div>
    <div class="sec-lbl">目標</div>
    <div class="row2">
      <div class="fg"><label>年間目標（口）</label><input type="number" id="ky-ta" inputmode="numeric"></div>
      <div class="fg"><label>新規目標（口）</label><input type="number" id="ky-tn" inputmode="numeric"></div>
    </div>
    <div class="sec-lbl">達成</div>
    <div class="row2">
      <div class="fg"><label>年間達成（口）</label><input type="number" id="ky-aa" inputmode="numeric"></div>
      <div class="fg"><label>新規達成（口）</label><input type="number" id="ky-an" inputmode="numeric"></div>
    </div>
    <button class="btn btn-p" onclick="saveKy()">保存</button>
    <button class="btn btn-g" onclick="closeO('ov-ky')">キャンセル</button>
  </div>
</div>

<!-- ===== MODAL: 見込み客追加/編集 ===== -->
<div class="ov" id="ov-p" onclick="closeOv(event,'ov-p')">
  <div class="sheet">
    <div class="sh-hnd"></div>
    <div class="sh-ttl" id="p-ttl">見込み客を追加</div>
    <input type="hidden" id="p-eid">
    <div class="fg"><label>氏名 *</label><input type="text" id="p-name" placeholder="例：山田 太郎 様"></div>
    <div class="row2">
      <div class="fg"><label>AC（万円）</label><input type="number" id="p-ac" inputmode="decimal" placeholder="0"></div>
      <div class="fg"><label>被保数（名）</label><input type="number" id="p-hi" inputmode="decimal" step="0.5" placeholder="1"></div>
    </div>
    <div class="fg">
      <label>ステータス</label>
      <select id="p-st">
        <option value="mikomu">見込み</option>
        <option value="shodan">商談中</option>
        <option value="oazukari">お預かり</option>
        <option value="seiyaku">成約 ✅（目標に自動反映）</option>
        <option value="okotowari">お断り</option>
      </select>
    </div>
    <div class="fg"><label>次のアクション</label><input type="text" id="p-nxt" placeholder="例：来週月曜に電話"></div>
    <div class="fg"><label>メモ（家族構成・ニーズ・申し送り）</label><textarea id="p-memo" placeholder="自由に入力"></textarea></div>
    <button class="btn btn-p" onclick="saveP()">保存</button>
    <button class="btn btn-d" id="p-del" onclick="delP()" style="display:none">削除</button>
    <button class="btn btn-g" onclick="closeO('ov-p')">キャンセル</button>
  </div>
</div>

<!-- ===== MODAL: 見込み客詳細 ===== -->
<div class="ov" id="ov-pd" onclick="closeOv(event,'ov-pd')">
  <div class="sheet" id="pd-body"></div>
</div>

<!-- ===== MODAL: タスク追加/編集 ===== -->
<div class="ov" id="ov-t" onclick="closeOv(event,'ov-t')">
  <div class="sheet">
    <div class="sh-hnd"></div>
    <div class="sh-ttl" id="t-ttl">タスクを追加</div>
    <input type="hidden" id="t-eid">
    <div class="fg"><label>内容 *</label><input type="text" id="t-cnt" placeholder="例：田中様にフォローコール"></div>
    <div class="fg"><label>期限・時間</label><input type="text" id="t-due" placeholder="例：今日中、6/10 午前"></div>
    <div class="fg"><label>メモ</label><input type="text" id="t-memo" placeholder="補足"></div>
    <button class="btn btn-p" onclick="saveT()">保存</button>
    <button class="btn btn-d" id="t-del" onclick="delT()" style="display:none">削除</button>
    <button class="btn btn-g" onclick="closeO('ov-t')">キャンセル</button>
  </div>
</div>

<!-- ===== MODAL: 資料カテゴリ ===== -->
<div class="ov" id="ov-rc" onclick="closeOv(event,'ov-rc')">
  <div class="sheet">
    <div class="sh-hnd"></div>
    <div class="sh-ttl" id="rc-ttl">カテゴリを追加</div>
    <input type="hidden" id="rc-eid">
    <div class="fg"><label>カテゴリ名 *</label><input type="text" id="rc-nm" placeholder="例：若年層"></div>
    <button class="btn btn-p" onclick="saveRC()">保存</button>
    <button class="btn btn-d" id="rc-del" onclick="delRC()" style="display:none">削除</button>
    <button class="btn btn-g" onclick="closeO('ov-rc')">キャンセル</button>
  </div>
</div>

<!-- ===== MODAL: 資料アイテム ===== -->
<div class="ov" id="ov-ri" onclick="closeOv(event,'ov-ri')">
  <div class="sheet">
    <div class="sh-hnd"></div>
    <div class="sh-ttl" id="ri-ttl">資料を追加</div>
    <input type="hidden" id="ri-cid">
    <input type="hidden" id="ri-eid">
    <div class="fg"><label>タイトル *</label><input type="text" id="ri-ttlv" placeholder="例：初回面談・保障の話し方"></div>
    <div class="fg"><label>内容・トーク・ポイント</label><textarea id="ri-cnt" style="min-height:180px" placeholder="トーク内容、ポイント、注意事項など自由に入力"></textarea></div>
    <button class="btn btn-p" onclick="saveRI()">保存</button>
    <button class="btn btn-d" id="ri-del" onclick="delRI()" style="display:none">削除</button>
    <button class="btn btn-g" onclick="closeO('ov-ri')">キャンセル</button>
  </div>
</div>

<!-- ===== MODAL: 資料詳細 ===== -->
<div class="ov" id="ov-rd" onclick="closeOv(event,'ov-rd')">
  <div class="sheet" id="rd-body"></div>
</div>

<script>
// =====================
// DATA
// =====================
const DKEY = 'ws_v2';
const uid  = () => Date.now().toString(36)+Math.random().toString(36).slice(2);

const DEFAULTS = {
  shacho:{ targetAC:800, targetHiho:60, targetJunsen:36 },
  kyoko: { targetAnn:385, targetNew:250, achAnn:100, achNew:100 },
  prospects:[],
  tasks:[],
  resources:[
    {id:'rc1',name:'若年層',open:false,items:[
      {id:'ri1',title:'初回面談・保障',content:''},
      {id:'ri2',title:'親反対への対応',content:''}
    ]},
    {id:'rc2',name:'リタイアメント層',open:false,items:[
      {id:'ri3',title:'介護',content:''},
      {id:'ri4',title:'相続',content:''}
    ]},
    {id:'rc3',name:'新規採用対策',open:false,items:[]}
  ]
};

let D = (()=>{
  try{ const v=JSON.parse(localStorage.getItem(DKEY)); return v||deepCopy(DEFAULTS); }
  catch{ return deepCopy(DEFAULTS); }
})();
// ensure keys exist
['shacho','kyoko','prospects','tasks','resources'].forEach(k=>{ if(!D[k]) D[k]=deepCopy(DEFAULTS[k]); });

function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }
const persist = ()=>localStorage.setItem(DKEY,JSON.stringify(D));

// =====================
// NAVIGATION
// =====================
let curPage='goal';
const PAGES=['goal','prospect','task','resource'];

function goto(id){
  PAGES.forEach(p=>{
    document.getElementById('page-'+p).classList.toggle('on', p===id);
    document.getElementById('nb-'+p).classList.toggle('on', p===id);
  });
  document.getElementById('fab-p').style.display = id==='prospect'?'flex':'none';
  document.getElementById('fab-t').style.display = id==='task'    ?'flex':'none';
  document.getElementById('fab-r').style.display = id==='resource'?'flex':'none';
  curPage=id;
  if(id==='goal')     renderGoal();
  if(id==='prospect') renderProspects();
  if(id==='task')     renderTasks();
  if(id==='resource') renderResources();
}

// =====================
// MODAL HELPERS
// =====================
function openO(id){ document.getElementById(id).classList.add('open'); }
function closeO(id){ document.getElementById(id).classList.remove('open'); }
function closeOv(e,id){ if(e.target.id===id) closeO(id); }

// =====================
// DATE HELPERS
// =====================
function daysUntil(d){ const t=new Date(); t.setHours(0,0,0,0); return Math.ceil((d-t)/86400000); }

function getShimeDates(){
  const today=new Date(); today.setHours(0,0,0,0);
  const y=today.getFullYear(), m=today.getMonth();
  const cands=[
    new Date(y,m,15), new Date(y,m+1,15),
    new Date(y,8,15), // 9/15
    new Date(y+1,2,15) // 3/15 next year
  ].filter(d=>d>=today);
  const seen=new Set(), out=[];
  cands.sort((a,b)=>a-b).forEach(d=>{
    const k=d.toDateString();
    if(!seen.has(k)){ seen.add(k); out.push(d); }
  });
  return out.slice(0,3).map(d=>({
    label:`${d.getMonth()+1}月${d.getDate()}日`,
    days:daysUntil(d)
  }));
}

function daysUntilKyoko(){
  const t=new Date(); t.setHours(0,0,0,0);
  return daysUntil(new Date(t.getFullYear(),11,31));
}

// =====================
// FORMAT
// =====================
function fn(n){ const v=Number(n); return v%1===0?v.toString():v.toFixed(1); }
function pct(a,t){ return t>0?Math.min(100,Math.round(a/t*100)):0; }

// =====================
// GOAL PAGE
// =====================
function calcShacho(){
  const sey=D.prospects.filter(p=>p.status==='seiyaku');
  const pip=D.prospects.filter(p=>['mikomu','shodan','oazukari'].includes(p.status));
  return{
    achAC:  sey.reduce((s,p)=>s+(+p.ac||0),0),
    achHi:  sey.reduce((s,p)=>s+(+p.hi||0),0),
    plAC:   pip.reduce((s,p)=>s+(+p.ac||0),0),
    plHi:   pip.reduce((s,p)=>s+(+p.hi||0),0),
    cntSey: sey.length
  };
}

function renderGoal(){
  const s=D.shacho, k=D.kyoko, c=calcShacho();
  const shimes=getShimeDates();

  const acPct=pct(c.achAC,s.targetAC);

// =====================
// PROSPECT
// =====================
const STAT={
  mikomu:   {lbl:'見込み',   cls:'bm'},
  shodan:   {lbl:'商談中',   cls:'bs'},
  oazukari: {lbl:'お預かり', cls:'ba'},
  seiyaku:  {lbl:'成約',     cls:'bse'},
  okotowari:{lbl:'お断り',   cls:'bo'},
};
const STAT_ORD={mikomu:0,shodan:1,oazukari:2,seiyaku:3,okotowari:4};
let pFlt='all';

function setFilter(btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  pFlt=btn.dataset.f;
  renderProspects();
}

function renderProspects(){
  let list=D.prospects;
  if(pFlt!=='all') list=list.filter(p=>p.status===pFlt);
  list=[...list].sort((a,b)=>(STAT_ORD[a.status]||0)-(STAT_ORD[b.status]||0));
  const el=document.getElementById('p-list');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-ic">👤</div>見込み客がいません<br><span style="font-size:13px">右下の＋から追加</span></div>';
    return;
  }
  el.innerHTML=list.map(p=>{
    const st=STAT[p.status]||STAT.mikomu;
    return`<div class="pi" onclick="showPD('${p.id}')">
      <div class="pi-top">
        <div class="pi-name">${p.name}</div>
        <span class="bdg ${st.cls}">${st.lbl}</span>
      </div>
      <div class="pi-sub">AC ${fn(p.ac||0)}万円 ／ 被保数 ${fn(p.hi||0)}名${p.nxt?` ／ <span style="color:var(--blue)">${p.nxt}</span>`:''}</div>
    </div>`;
  }).join('');
}

function openPNew(){
  document.getElementById('p-ttl').textContent='見込み客を追加';
  document.getElementById('p-eid').value='';
  ['p-name','p-nxt','p-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('p-ac').value='';
  document.getElementById('p-hi').value='';
  document.getElementById('p-st').value='mikomu';
  document.getElementById('p-del').style.display='none';
  openO('ov-p');
}

function editP(id){
  const p=D.prospects.find(x=>x.id===id);
  if(!p) return;
  document.getElementById('p-ttl').textContent='見込み客を編集';
  document.getElementById('p-eid').value=p.id;
  document.getElementById('p-name').value=p.name;
  document.getElementById('p-ac').value=p.ac||'';
  document.getElementById('p-hi').value=p.hi||'';
  document.getElementById('p-st').value=p.status;
  document.getElementById('p-nxt').value=p.nxt||'';
  document.getElementById('p-memo').value=p.memo||'';
  document.getElementById('p-del').style.display='block';
  closeO('ov-pd');
  openO('ov-p');
}

function saveP(){
  const name=document.getElementById('p-name').value.trim();
  if(!name){ alert('氏名を入力してください'); return; }
  const eid=document.getElementById('p-eid').value;
  const d={name, ac:+document.getElementById('p-ac').value||0, hi:+document.getElementById('p-hi').value||0,
            status:document.getElementById('p-st').value, nxt:document.getElementById('p-nxt').value,
            memo:document.getElementById('p-memo').value};
  if(eid){ const i=D.prospects.findIndex(x=>x.id===eid); if(i>=0) D.prospects[i]={...D.prospects[i],...d}; }
  else D.prospects.push({id:uid(),...d});
  persist(); closeO('ov-p'); renderProspects();
  if(curPage==='goal') renderGoal();
}

function delP(){
  const eid=document.getElementById('p-eid').value;
  if(!eid||!confirm('削除しますか？')) return;
  D.prospects=D.prospects.filter(p=>p.id!==eid);
  persist(); closeO('ov-p'); renderProspects();
}

function showPD(id){
  const p=D.prospects.find(x=>x.id===id);
  if(!p) return;
  const st=STAT[p.status]||STAT.mikomu;
  document.getElementById('pd-body').innerHTML=`
    <div class="sh-hnd"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div style="font-size:20px;font-weight:800;line-height:1.3">${p.name}</div>
      <span class="bdg ${st.cls}" style="font-size:13px;padding:4px 12px;flex-shrink:0;margin-left:8px">${st.lbl}</span>
    </div>
    <div style="display:flex;gap:20px;margin-bottom:14px">
      <div>
        <div style="font-size:11px;color:var(--gray)">AC</div>
        <div style="font-size:22px;font-weight:800;color:var(--blue)">${fn(p.ac||0)}<span style="font-size:13px">万円</span></div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--gray)">被保数</div>
        <div style="font-size:22px;font-weight:800;color:var(--purple)">${fn(p.hi||0)}<span style="font-size:13px">名</span></div>
      </div>
    </div>
    ${p.nxt?`<div style="margin-bottom:12px"><div style="font-size:12px;color:var(--gray)">次のアクション</div><div style="font-size:14px;font-weight:600;color:var(--blue);margin-top:3px">→ ${p.nxt}</div></div>`:''}
    ${p.memo?`<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--gray)">メモ</div><div class="content-pre" style="margin-top:4px">${p.memo}</div></div>`:''}
    <button class="btn btn-p" onclick="editP('${p.id}')">✏️ 編集</button>
    <button class="btn btn-g" onclick="closeO('ov-pd')">閉じる</button>`;
  openO('ov-pd');
}

// =====================
// TASKS
// =====================
function renderTasks(){
  const el=document.getElementById('t-list');
  if(!D.tasks.length){
    el.innerHTML='<div class="empty"><div class="empty-ic">✅</div>タスクがありません<br><span style="font-size:13px">右下の＋から追加</span></div>';
    return;
  }
  const sorted=[...D.tasks].sort((a,b)=>a.done===b.done?0:a.done?1:-1);
  el.innerHTML=sorted.map(t=>`
    <div class="ti">
      <div class="tck ${t.done?'done':''}" onclick="toggleT('${t.id}')">${t.done?'✓':''}</div>
      <div style="flex:1" onclick="editT('${t.id}')">
        <div class="ttxt ${t.done?'done':''}">${t.cnt}</div>
        ${t.due?`<div style="font-size:12px;color:var(--gray);margin-top:2px">🕐 ${t.due}</div>`:''}
        ${t.memo?`<div style="font-size:12px;color:var(--gray);margin-top:1px">${t.memo}</div>`:''}
      </div>
    </div>`).join('');
}

function toggleT(id){
  const t=D.tasks.find(x=>x.id===id);
  if(t){ t.done=!t.done; persist(); renderTasks(); }
}

function openTNew(){
  document.getElementById('t-ttl').textContent='タスクを追加';
  document.getElementById('t-eid').value='';
  ['t-cnt','t-due','t-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-del').style.display='none';
  openO('ov-t');
}

function editT(id){
  const t=D.tasks.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('t-ttl').textContent='タスクを編集';
  document.getElementById('t-eid').value=t.id;
  document.getElementById('t-cnt').value=t.cnt;
  document.getElementById('t-due').value=t.due||'';
  document.getElementById('t-memo').value=t.memo||'';
  document.getElementById('t-del').style.display='block';
  openO('ov-t');
}

function saveT(){
  const cnt=document.getElementById('t-cnt').value.trim();
  if(!cnt){ alert('内容を入力してください'); return; }
  const eid=document.getElementById('t-eid').value;
  const d={cnt, due:document.getElementById('t-due').value, memo:document.getElementById('t-memo').value};
  if(eid){ const i=D.tasks.findIndex(x=>x.id===eid); if(i>=0) D.tasks[i]={...D.tasks[i],...d}; }
  else D.tasks.push({id:uid(), done:false, ...d});
  persist(); closeO('ov-t'); renderTasks();
}

function delT(){
  const eid=document.getElementById('t-eid').value;
  if(!eid||!confirm('削除しますか？')) return;
  D.tasks=D.tasks.filter(t=>t.id!==eid);
  persist(); closeO('ov-t'); renderTasks();
}

// RESOURCES
// =====================
function renderResources(){
  const el=document.getElementById('res-list');
  if(!D.resources.length){
    el.innerHTML='<div class="empty"><div class="empty-ic">📚</div>カテゴリがありません<br><span style="font-size:13px">右下の＋から追加</span></div>';
    return;
  }
  el.innerHTML=D.resources.map((cat,ci)=>`
    <div>
      ${ci>0?'<div class="divider"></div>':''}
      <div class="rc-hd" onclick="toggleRC('${cat.id}')">
        <div class="rc-name">${cat.name} <span style="font-size:12px;color:var(--gray);font-weight:400">${cat.items.length}件</span></div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-g btn-sm" onclick="event.stopPropagation();openRCatEdit('${cat.id}')">編集</button>
          <span style="color:var(--gray);font-size:18px;margin-right:2px">${cat.open?'▾':'▸'}</span>
        </div>
      </div>
      <div class="ri-wrap ${cat.open?'open':''}">
        ${cat.items.map(item=>`
          <div class="ri" onclick="showRD('${cat.id}','${item.id}')">
            <span>${item.title}</span>
            <span style="color:var(--gray);font-size:18px">›</span>
          </div>`).join('')}
        <div class="ri-add" onclick="openRItemNew('${cat.id}')">＋ 項目を追加</div>
      </div>
    </div>`).join('');
}

function toggleRC(id){
  const c=D.resources.find(x=>x.id===id);
  if(c){ c.open=!c.open; persist(); renderResources(); }
}

function openRCatNew(){
  document.getElementById('rc-ttl').textContent='カテゴリを追加';
  document.getElementById('rc-eid').value='';
  document.getElementById('rc-nm').value='';
  document.getElementById('rc-del').style.display='none';
  openO('ov-rc');
}

function openRCatEdit(id){
  const c=D.resources.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('rc-ttl').textContent='カテゴリを編集';
  document.getElementById('rc-eid').value=id;
  document.getElementById('rc-nm').value=c.name;
  document.getElementById('rc-del').style.display='block';
  openO('ov-rc');
}

function saveRC(){
  const name=document.getElementById('rc-nm').value.trim();
  if(!name){ alert('カテゴリ名を入力してください'); return; }
  const eid=document.getElementById('rc-eid').value;
  if(eid){ const c=D.resources.find(x=>x.id===eid); if(c) c.name=name; }
  else D.resources.push({id:uid(), name, open:false, items:[]});
  persist(); closeO('ov-rc'); renderResources();
}

function delRC(){
  const eid=document.getElementById('rc-eid').value;
  if(!eid||!confirm('カテゴリごと削除しますか？（中の資料も消えます）')) return;
  D.resources=D.resources.filter(c=>c.id!==eid);
  persist(); closeO('ov-rc'); renderResources();
}

function openRItemNew(catId){
  document.getElementById('ri-ttl').textContent='資料を追加';
  document.getElementById('ri-cid').value=catId;
  document.getElementById('ri-eid').value='';
  document.getElementById('ri-ttlv').value='';
  document.getElementById('ri-cnt').value='';
  document.getElementById('ri-del').style.display='none';
  openO('ov-ri');
}

function openRItemEdit(catId, itemId){
  const cat=D.resources.find(c=>c.id===catId);
  if(!cat) return;
  const item=cat.items.find(i=>i.id===itemId);
  if(!item) return;
  document.getElementById('ri-ttl').textContent='資料を編集';
  document.getElementById('ri-cid').value=catId;
  document.getElementById('ri-eid').value=itemId;
  document.getElementById('ri-ttlv').value=item.title;
  document.getElementById('ri-cnt').value=item.content||'';
  document.getElementById('ri-del').style.display='block';
  closeO('ov-rd');
  openO('ov-ri');
}

function saveRI(){
  const title=document.getElementById('ri-ttlv').value.trim();
  if(!title){ alert('タイトルを入力してください'); return; }
  const catId=document.getElementById('ri-cid').value;
  const eid=document.getElementById('ri-eid').value;
  const content=document.getElementById('ri-cnt').value;
  const cat=D.resources.find(c=>c.id===catId);
  if(!cat) return;
  if(eid){ const i=cat.items.findIndex(x=>x.id===eid); if(i>=0) cat.items[i]={...cat.items[i],title,content}; }
  else cat.items.push({id:uid(), title, content});
  persist(); closeO('ov-ri'); renderResources();
}

function delRI(){
  const catId=document.getElementById('ri-cid').value;
  const eid=document.getElementById('ri-eid').value;
  if(!eid||!confirm('削除しますか？')) return;
  const cat=D.resources.find(c=>c.id===catId);
  if(cat) cat.items=cat.items.filter(i=>i.id!==eid);
  persist(); closeO('ov-ri'); renderResources();
}

function showRD(catId, itemId){
  const cat=D.resources.find(c=>c.id===catId);
  if(!cat) return;
  const item=cat.items.find(i=>i.id===itemId);
  if(!item) return;
  document.getElementById('rd-body').innerHTML=`
    <div class="sh-hnd"></div>
    <div style="font-size:12px;color:var(--blue);font-weight:700;margin-bottom:4px">${cat.name}</div>
    <div style="font-size:20px;font-weight:800;margin-bottom:12px">${item.title}</div>
    ${item.content
      ?`<div class="content-pre">${item.content}</div>`
      :'<div style="color:var(--gray);text-align:center;padding:24px 0;font-size:14px">内容が未入力です</div>'}
    <div style="height:14px"></div>
    <button class="btn btn-p" onclick="openRItemEdit('${catId}','${itemId}')">✏️ 編集</button>
    <button class="btn btn-g" onclick="closeO('ov-rd')">閉じる</button>`;
  openO('ov-rd');
}

(function(){

})();
